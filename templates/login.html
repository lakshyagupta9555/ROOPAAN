{% extends 'base.html' %}

{% block title %}Login - ROOPAAN{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
                📦 ROOPAAN
            </h2>
            <p class="mt-2 text-center text-sm text-gray-400">
                Sign in to your ROOPAAN account
            </p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input id="username" name="username" type="text" required 
                           class="appearance-none rounded-lg relative block w-full px-3 py-2 bg-gray-700 border border-gray-600 placeholder-gray-400 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                           placeholder="Enter your username">
                </div>
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input id="password" name="password" type="password" required 
                           class="appearance-none rounded-lg relative block w-full px-3 py-2 bg-gray-700 border border-gray-600 placeholder-gray-400 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                           placeholder="Enter your password">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-3">Login As</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="user_type" value="inventory" required class="hidden peer">
                            <div class="px-4 py-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-center text-white hover:bg-gray-600 peer-checked:bg-blue-600 peer-checked:border-blue-500 transition-all">
                                <div class="font-medium">📦 Inventory Manager</div>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="user_type" value="seller" required class="hidden peer">
                            <div class="px-4 py-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-center text-white hover:bg-gray-600 peer-checked:bg-blue-600 peer-checked:border-blue-500 transition-all">
                                <div class="font-medium">💼 Seller</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

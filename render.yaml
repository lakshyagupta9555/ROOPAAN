services:
  - type: web
    name: inventory-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn inventory_system.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
    
databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
